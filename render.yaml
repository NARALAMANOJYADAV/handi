services:
  - type: web
    name: handivoice
    env: node
    plan: free
    buildCommand: npm install && cd client && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        value: "https://handivoice.onrender.com"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
